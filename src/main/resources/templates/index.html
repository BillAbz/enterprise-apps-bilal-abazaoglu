<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Events - Anderlecht Community NGO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

<div th:replace="~{fragments/header :: header}"></div>

<main class="container mx-auto px-6 py-10 flex-grow">

    <div class="flex justify-between items-center mb-6">
        <h1 class="text-3xl font-bold text-gray-800">
            Laatste evenementen
        </h1>

        <a th:href="@{/events/new}"
           class="bg-green-700 text-white px-5 py-2 rounded hover:bg-green-800">
            Nieuw evenement toevoegen
        </a>
    </div>

    <div class="bg-white shadow-md rounded-lg overflow-hidden">
        <table class="w-full border-collapse">
            <thead class="bg-green-700 text-white">
            <tr>
                <th class="text-left px-6 py-3">Titel</th>
                <th class="text-left px-6 py-3">Organisatie</th>
                <th class="text-left px-6 py-3">Details</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="event : ${events}" class="border-b hover:bg-gray-50">
                <td class="px-6 py-4" th:text="${event.title}">
                    Event Titel
                </td>

                <td class="px-6 py-4" th:text="${event.organisation}">
                    Organisatie
                </td>

                <td class="px-6 py-4">
                    <a th:href="@{/events/{id}(id=${event.id})}"
                       class="text-green-700 font-semibold hover:underline">
                        Bekijk details
                    </a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(events)}">
                <td colspan="3" class="px-6 py-4 text-center text-gray-500">
                    Geen evenementen beschikbaar.
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
