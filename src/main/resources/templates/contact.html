<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Contact - Anderlecht Community NGO</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen flex flex-col">

<div th:replace="~{fragments/header :: header}"></div>

<main class="container mx-auto px-6 py-10 flex-grow max-w-3xl">

    <div class="bg-white shadow-md rounded-lg p-8">

        <h1 class="text-3xl font-bold text-gray-800 mb-6">
            Contact Us
        </h1>

        <p class="text-gray-600 mb-6">
            Do you have a question or would you like to contact our organisation?
            Send us a message using the form below.
        </p>

        <div th:if="${successMessage}"
             class="bg-green-100 border border-green-300 text-green-800 px-4 py-3 rounded mb-6">
            <span th:text="${successMessage}"></span>
        </div>

        <form th:action="@{/contact}"
              th:object="${contactMessage}"
              method="post"
              class="space-y-5">

            <div>
                <label class="block font-semibold mb-1">
                    Name
                </label>

                <input type="text"
                       th:field="*{name}"
                       class="w-full border rounded px-4 py-2">

                <p th:if="${#fields.hasErrors('name')}"
                   th:errors="*{name}"
                   class="text-red-600 text-sm mt-1"></p>
            </div>

            <div>
                <label class="block font-semibold mb-1">
                    Email
                </label>

                <input type="email"
                       th:field="*{email}"
                       class="w-full border rounded px-4 py-2">

                <p th:if="${#fields.hasErrors('email')}"
                   th:errors="*{email}"
                   class="text-red-600 text-sm mt-1"></p>
            </div>

            <div>
                <label class="block font-semibold mb-1">
                    Message
                </label>

                <textarea th:field="*{message}"
                          rows="6"
                          class="w-full border rounded px-4 py-2"></textarea>

                <p th:if="${#fields.hasErrors('message')}"
                   th:errors="*{message}"
                   class="text-red-600 text-sm mt-1"></p>
            </div>

            <button type="submit"
                    class="bg-green-700 text-white px-6 py-2 rounded hover:bg-green-800">
                Send Message
            </button>

        </form>

    </div>

</main>

<div th:replace="~{fragments/footer :: footer}"></div>

</body>
</html>
